        <rect x="0" y="0" width="1600" height="980" rx="0" class="bg" /><text x="64" y="72" class="title">Redveil</text><text x="64" y="108" class="subtitle">서울 소형 상가 매입 전에 보류 사유를 먼저 보여주는 리스크 판별 서비스</text><rect x="64" y="148" width="344" height="110" rx="24" class="panel" /><circle cx="90" cy="178" r="8" fill="#d4572d" /><text x="112" y="186" class="label">거래 원천 데이터</text><text x="86" y="230" class="metric">12,074건</text><rect x="426" y="148" width="344" height="110" rx="24" class="panel" /><circle cx="452" cy="178" r="8" fill="#2c6c7f" /><text x="474" y="186" class="label">비교 구 수</text><text x="448" y="230" class="metric">25개</text><rect x="788" y="148" width="344" height="110" rx="24" class="panel" /><circle cx="814" cy="178" r="8" fill="#c99624" /><text x="836" y="186" class="label">행정동 커버</text><text x="810" y="230" class="metric">428개</text><rect x="1150" y="148" width="344" height="110" rx="24" class="panel" /><circle cx="1176" cy="178" r="8" fill="#8b4f81" /><text x="1198" y="186" class="label">분석 상권 수</text><text x="1172" y="230" class="metric">1,570개</text><rect x="64" y="292" width="760" height="616" rx="30" class="panel" /><text x="96" y="340" class="h2">상위 위험 구와 점수</text><text x="96" y="368" class="small">전체 리스크 점수가 높은 구를 먼저 보여줍니다.</text><text x="96" y="430" class="strong">서초구</text><text x="210" y="430" class="score">78.9</text><text x="298" y="430" class="small">매우 높음</text><rect x="96" y="444" width="520" height="14" rx="7" /><rect x="96" y="444" width="520" height="14" rx="7" fill="#efe7dd" /><rect x="96" y="444" width="430" height="14" rx="7" fill="#d4572d" /><text x="96" y="478" class="body">price burden is elevated, with 6m</text><text x="96" y="496" class="body">price growth at 104.2%; price</text><text x="96" y="506" class="strong">강남구</text><text x="210" y="506" class="score">71.8</text><text x="298" y="506" class="small">높음</text><rect x="96" y="520" width="520" height="14" rx="7" /><rect x="96" y="520" width="520" height="14" rx="7" fill="#efe7dd" /><rect x="96" y="520" width="391" height="14" rx="7" fill="#c99624" /><text x="96" y="554" class="body">price burden is elevated, with 6m</text><text x="96" y="572" class="body">price growth at 40.7%; price</text><text x="96" y="582" class="strong">중구</text><text x="210" y="582" class="score">70.2</text><text x="298" y="582" class="small">높음</text><rect x="96" y="596" width="520" height="14" rx="7" /><rect x="96" y="596" width="520" height="14" rx="7" fill="#efe7dd" /><rect x="96" y="596" width="382" height="14" rx="7" fill="#c99624" /><text x="96" y="630" class="body">price burden is elevated, with 6m</text><text x="96" y="648" class="body">price growth at 123.9%; price</text><text x="96" y="658" class="strong">종로구</text><text x="210" y="658" class="score">67.6</text><text x="298" y="658" class="small">높음</text><rect x="96" y="672" width="520" height="14" rx="7" /><rect x="96" y="672" width="520" height="14" rx="7" fill="#efe7dd" /><rect x="96" y="672" width="368" height="14" rx="7" fill="#c99624" /><text x="96" y="706" class="body">price burden is elevated, with 6m</text><text x="96" y="724" class="body">price growth at 5.8%; price</text><text x="96" y="734" class="strong">용산구</text><text x="210" y="734" class="score">64.9</text><text x="298" y="734" class="small">높음</text><rect x="96" y="748" width="520" height="14" rx="7" /><rect x="96" y="748" width="520" height="14" rx="7" fill="#efe7dd" /><rect x="96" y="748" width="353" height="14" rx="7" fill="#c99624" /><text x="96" y="782" class="body">price burden is elevated, with 6m</text><text x="96" y="800" class="body">price growth at -12.7%; price</text><text x="96" y="810" class="strong">영등포구</text><text x="210" y="810" class="score">63.4</text><text x="298" y="810" class="small">높음</text><rect x="96" y="824" width="520" height="14" rx="7" /><rect x="96" y="824" width="520" height="14" rx="7" fill="#efe7dd" /><rect x="96" y="824" width="345" height="14" rx="7" fill="#c99624" /><text x="96" y="858" class="body">price volatility has been high in</text><text x="96" y="876" class="body">recent months</text><rect x="852" y="292" width="684" height="300" rx="30" class="panel" /><text x="884" y="340" class="h2">대표 검토 메모 · 서초구</text><text x="884" y="370" class="small">점수 축과 보류 사유를 한 화면에서 읽게 구성했습니다.</text><text x="884" y="430" class="metric">78.9</text><text x="974" y="430" class="label">매우 높음</text><text x="884" y="462" class="small">가격 부담</text><rect x="972" y="450" width="250" height="12" rx="6" fill="#efe7dd" /><rect x="972" y="450" width="246" height="12" rx="6" fill="#d4572d" /><text x="1238" y="462" class="small" text-anchor="end">98.6</text><text x="884" y="490" class="small">유동성</text><rect x="972" y="478" width="250" height="12" rx="6" fill="#efe7dd" /><rect x="972" y="478" width="132" height="12" rx="6" fill="#2c6c7f" /><text x="1238" y="490" class="small" text-anchor="end">52.9</text><text x="884" y="518" class="small">상권 과밀</text><rect x="972" y="506" width="250" height="12" rx="6" fill="#efe7dd" /><rect x="972" y="506" width="178" height="12" rx="6" fill="#c99624" /><text x="1238" y="518" class="small" text-anchor="end">71.2</text><text x="884" y="546" class="small">변동성</text><rect x="972" y="534" width="250" height="12" rx="6" fill="#efe7dd" /><rect x="972" y="534" width="250" height="12" rx="6" fill="#d4572d" /><text x="1238" y="546" class="small" text-anchor="end">100.0</text><rect x="884" y="545" width="270" height="40" rx="20" class="chip" /><text x="902" y="571" class="body">pricing looks stretched…</text><rect x="1166" y="545" width="270" height="40" rx="20" class="chip" /><text x="1184" y="571" class="body">merchant saturation is…</text><rect x="1448" y="545" width="270" height="40" rx="20" class="chip" /><text x="1466" y="571" class="body">recent transaction pric…</text><rect x="852" y="620" width="684" height="288" rx="30" class="panel" /><text x="884" y="668" class="h2">대체 후보</text><text x="884" y="696" class="small">같은 검토 흐름에서 바로 비교할 수 있는 후보 구입니다.</text><text x="884" y="746" class="rank">1</text><text x="930" y="746" class="strong">금천구</text><text x="1040" y="746" class="score">50.2</text><text x="1136" y="736" class="body">총 리스크가 더 낮음; 상권 과밀 부담이 더 낮음</text><line x1="884" y1="768" x2="1500" y2="768" stroke="#ede2d6" /><text x="884" y="800" class="rank">2</text><text x="930" y="800" class="strong">관악구</text><text x="1040" y="800" class="score">50.3</text><text x="1136" y="790" class="body">총 리스크가 더 낮음; 유동성이 더 안정적; 상권</text><text x="1136" y="808" class="body">과밀 부담이 더 낮음</text><line x1="884" y1="822" x2="1500" y2="822" stroke="#ede2d6" /><text x="884" y="854" class="rank">3</text><text x="930" y="854" class="strong">양천구</text><text x="1040" y="854" class="score">54.5</text><text x="1136" y="844" class="body">총 리스크가 더 낮음; 상권 과밀 부담이 더 낮음</text><text x="64" y="946" class="small">README 기준 첫 화면에서 서비스 목적, 핵심 수치, 위험 구, 대체 후보까지 한 번에 보이도록 재구성했습니다.</text></svg>