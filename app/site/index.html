<!doctype html>

  <head>

    />

  <body data-page="home">
    <div class="bg-orb bg-orb-left"></div>
    <div class="bg-orb bg-orb-right"></div>
    <div class="site-shell">
      <header class="site-header">
        <a class="brand" href="./index.html">
          <span class="brand-kicker">서울 소형 상가 매입 리스크 판별 서비스</span>

            <p id="hero-subtitle" class="hero-body hero-body-compact"></p>

            <div class="hero-mini-metrics">
              <div>
                <span>거래 분석</span>
