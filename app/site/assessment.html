<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>3분 진단 | Redveil</title>
    <meta
      name="description"
      content="예상 매입가와 보유 기간을 넣고 빠르게 매입 보류 신호를 확인합니다."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=Noto+Serif+KR:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="assessment">
    <div class="bg-orb bg-orb-left"></div>
    <div class="bg-orb bg-orb-right"></div>
    <div class="site-shell">
      <header class="site-header">
        <a class="brand" href="./index.html" aria-label="Redveil 홈">
          <span class="brand-kicker">서울 소형 상가 매입 리스크 판별 서비스</span>
          <strong>Redveil</strong>
        </a>
        <nav class="site-nav">
          <a href="./index.html">홈</a>
          <a href="./review.html">내 매물 검토</a>
          <a href="./assessment.html">3분 진단</a>
          <a href="./compare.html">후보 비교</a>
          <a href="./districts.html">구별 리포트</a>
          <a href="./cases.html">케이스 스터디</a>
          <a href="./methodology.html">방법론</a>
          <a href="./data.html">데이터</a>
        </nav>
      </header>

      <main class="page-stack">
        <section class="page-hero section-card">
          <p class="eyebrow">Quick Assessment</p>
          <h1>빠른 보류 신호 확인</h1>
          <p class="section-copy">구, 가격, 보유 기간만 넣으면 됩니다.</p>
        </section>

        <section class="two-column">
          <article class="section-card">
            <div class="section-head">
              <p class="eyebrow">Input</p>
              <h2>진단 조건</h2>
            </div>
            <form id="assessment-form" class="form-grid">
              <label class="form-field">
                <span>검토할 구</span>
                <select id="district-code" required></select>
              </label>
              <label class="form-field">
                <span>예상 매입가 (만원/㎡)</span>
                <input id="asking-price" type="number" min="0" step="0.1" placeholder="예: 2500" />
              </label>
              <label class="form-field">
                <span>예상 보유 기간 (개월)</span>
                <input id="holding-months" type="number" min="6" max="180" step="6" value="36" />
              </label>
              <label class="form-field">
                <span>우선순위</span>
                <select id="priority">
                  <option value="cashflow">현금흐름</option>
                  <option value="balanced" selected>균형</option>
                  <option value="growth">가격 상승</option>
                </select>
              </label>
              <button class="button primary" type="submit">진단 실행</button>
            </form>
          </article>

          <article class="section-card" id="assessment-result">
            <div class="section-head">
              <p class="eyebrow">Assessment Result</p>
              <h2>진단 결과</h2>
            </div>
            <p class="section-copy">조건을 넣고 바로 확인하세요.</p>
          </article>
        </section>
      </main>
    </div>

    <script src="./website_payload.js"></script>
    <script src="./common.js"></script>
    <script src="./assessment.js"></script>
  </body>
</html>
