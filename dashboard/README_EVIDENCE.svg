        <rect x="0" y="0" width="1600" height="920" rx="0" class="bg" /><text x="64" y="72" class="title">점수의 근거가 어떻게 보이는가</text><text x="64" y="108" class="subtitle">수요 취약 상권과 행정동 과밀도를 분리해 보여주고, 최종 판단은 매물 검토 화면으로 연결합니다.</text><rect x="64" y="150" width="710" height="690" rx="30" class="panel" /><rect x="826" y="150" width="710" height="690" rx="30" class="panel" /><text x="96" y="198" class="h2">수요 취약 상권</text><text x="96" y="226" class="small">거래 효율, 객단가, 업종 폭이 약한 상권을 먼저 보여줍니다.</text><text x="858" y="198" class="h2">행정동 과밀 구간</text><text x="858" y="226" class="small">점포 밀도와 업종 집중도가 높은 행정동을 바로 확인할 수 있습니다.</text><text x="96" y="280" class="strong">대원종합시장</text><text x="96" y="304" class="small">전통시장</text><text x="300" y="280" class="score">81.2</text><text x="368" y="280" class="small">매우 높음</text><rect x="96" y="316" width="300" height="12" rx="6" fill="#efe7dd" /><rect x="96" y="316" width="290" height="12" rx="6" fill="#d4572d" /><text x="420" y="286" class="body">sales efficiency versus foot</text><text x="420" y="304" class="body">traffic is weak; floatin…</text><text x="96" y="368" class="strong">남부종합시장</text><text x="96" y="392" class="small">전통시장</text><text x="300" y="368" class="score">80.8</text><text x="368" y="368" class="small">매우 높음</text><rect x="96" y="404" width="300" height="12" rx="6" fill="#efe7dd" /><rect x="96" y="404" width="288" height="12" rx="6" fill="#d4572d" /><text x="420" y="374" class="body">sales efficiency versus foot</text><text x="420" y="392" class="body">traffic is weak; average…</text><text x="96" y="456" class="strong">동진시장</text><text x="96" y="480" class="small">전통시장</text><text x="300" y="456" class="score">78.6</text><text x="368" y="456" class="small">매우 높음</text><rect x="96" y="492" width="300" height="12" rx="6" fill="#efe7dd" /><rect x="96" y="492" width="280" height="12" rx="6" fill="#d4572d" /><text x="420" y="462" class="body">sales efficiency versus foot</text><text x="420" y="480" class="body">traffic is weak; average…</text><text x="96" y="544" class="strong">백운시장</text><text x="96" y="568" class="small">전통시장</text><text x="300" y="544" class="score">76.1</text><text x="368" y="544" class="small">매우 높음</text><rect x="96" y="580" width="300" height="12" rx="6" fill="#efe7dd" /><rect x="96" y="580" width="271" height="12" rx="6" fill="#d4572d" /><text x="420" y="550" class="body">sales efficiency versus foot</text><text x="420" y="568" class="body">traffic is weak; average…</text><text x="96" y="632" class="strong">청담역 12번</text><text x="96" y="656" class="small">골목상권</text><text x="300" y="632" class="score">74.3</text><text x="368" y="632" class="small">높음</text><rect x="96" y="668" width="300" height="12" rx="6" fill="#efe7dd" /><rect x="96" y="668" width="265" height="12" rx="6" fill="#c99624" /><text x="420" y="638" class="body">sales efficiency versus foot</text><text x="420" y="656" class="body">traffic is weak; average…</text><text x="96" y="720" class="strong">남태령역(서울전자고등학교)</text><text x="96" y="744" class="small">골목상권</text><text x="300" y="720" class="score">73.6</text><text x="368" y="720" class="small">높음</text><rect x="96" y="756" width="300" height="12" rx="6" fill="#efe7dd" /><rect x="96" y="756" width="262" height="12" rx="6" fill="#c99624" /><text x="420" y="726" class="body">sales efficiency versus foot</text><text x="420" y="744" class="body">traffic is weak; average…</text><text x="858" y="280" class="strong">역삼1동</text><text x="970" y="280" class="small">강남구</text><text x="858" y="304" class="body">점포 13,380개</text><text x="970" y="304" class="body">음식점 비중 19.8%</text><rect x="858" y="316" width="280" height="12" rx="6" fill="#efe7dd" /><rect x="858" y="316" width="280" height="12" rx="6" fill="#2c6c7f" /><text x="1162" y="286" class="body">경영 컨설팅업:1521 | 부동산 중개/대리업:855 | 광고 대행업:737</text><text x="858" y="368" class="strong">가산동</text><text x="970" y="368" class="small">금천구</text><text x="858" y="392" class="body">점포 10,017개</text><text x="970" y="392"